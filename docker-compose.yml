version: "3.9"

services:
  backend:
    build: .
    container_name: vishwamask-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  frontend:
    build: .
    container_name: vishwamask-frontend
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - .:/app